name: licheervnano-host-linux-amd64-cvi-mmf-sdk-ci

on:
  workflow_dispatch:

jobs:
  mksys:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 20G
          create-symlink: true
          key: ${{ runner.os }}-sg2002_licheervnano_sd

      - name: Create Timestamp
        run: |
          echo "BUILD_ID=$(date +%Y%m%d_%H%M%S)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Install Software
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential autoconf automake autotools-dev ninja-build make help2man \
            libncurses-dev gawk flex bison openssl libssl-dev tree wget curl cmake ccache \
            libtool-bin bc bzr ca-certificates cpio cvs file git locales mercurial \
            openssh-server python3 python3-flake8 python3-magic python3-nose2 python3-pexpect \
            python3-pytest rsync shellcheck subversion unzip pkg-config slib squashfs-tools \
            android-sdk-libsparse-utils jq python3-distutils tclsh scons parallel ssh-client \
            python3-dev python3-pip device-tree-compiler ssh fakeroot libncurses5-dev \
            mmdebstrap android-libext4-utils bdebstrap proot fakechroot \
            picolibc-riscv64-unknown-elf crossbuild-essential-riscv64 \
            binutils-riscv64-unknown-elf cpp-riscv64-linux-gnu g++-riscv64-linux-gnu \
            gcc-riscv64-linux-gnu libc6-dbg-riscv64-cross libatomic1-riscv64-cross \
            libasan8-riscv64-cross libc6-dev-riscv64-cross gcc-riscv64-unknown-elf \
            diffstat texinfo chrpath socat xz-utils debianutils iputils-ping \
            python3-git python3-jinja2 libegl1-mesa libsdl1.2-dev python3-subunit \
            mesa-common-dev zstd liblz4-tool libacl1 parted erofs-utils genext2fs \
            mtools fatcat ckermit neovim cscope asciinema libconfuse-dev

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: cvi_mmf_sdk
          ref: NanoKVM

      - name: Download Toolchain
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          pushd cvi_mmf_sdk
          wget -O host-tools.tar.gz https://sophon-file.sophon.cn/sophon-prod-s3/drive/23/03/07/16/host-tools.tar.gz
          tar xf host-tools.tar.gz
          popd

      - name: Make System
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          pushd cvi_mmf_sdk
          source build/cvisetup.sh
          defconfig sg2002_licheervnano_sd
          build_all
          popd

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          retention-days: 30
          name: licheervnano-cvi-mmf-sdk-output-${{ env.BUILD_ID }}
          path: |
            cvi_mmf_sdk/install/soc_sg2002_licheervnano_sd/images/*
            cvi_mmf_sdk/install/soc_sg2002_licheervnano_sd/*.bin
